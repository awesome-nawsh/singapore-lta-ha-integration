name: Validate

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # description/topics require GitHub repo Settings changes, and
          # brands requires a home-assistant/brands PR - none of these are
          # needed to install this repo as a HACS custom repository, only
          # for submission to the public HACS default store.
          ignore: "description topics brands"
